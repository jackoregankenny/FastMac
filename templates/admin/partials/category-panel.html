<!-- Category Panel -->
<div id="category-panel" class="fixed inset-0 overflow-hidden" style="display: none;">
    <div class="absolute inset-0 overflow-hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-gray-500 bg-opacity-75 transition-opacity" id="category-backdrop"></div>
        
        <!-- Panel -->
        <div class="pointer-events-auto fixed inset-y-0 right-0 flex max-w-full pl-10 transform transition-all duration-500 translate-x-full" id="category-slide">
            <div class="relative w-96 bg-white dark:bg-gray-800 shadow-xl">
                <!-- Header -->
                <div class="px-4 py-6 bg-gray-50 dark:bg-gray-900 sm:px-6">
                    <div class="flex items-center justify-between">
                        <h2 class="text-lg font-medium text-gray-900 dark:text-white" id="category-panel-title">
                            New Category
                        </h2>
                        <button id="close-category-panel"
                            class="rounded-md text-gray-400 hover:text-gray-500">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Content -->
                <form id="category-form" class="p-6">
                    <input type="hidden" id="category-id" name="id">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                Name
                            </label>
                            <input type="text"
                                id="category-name"
                                name="name"
                                required
                                class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 py-2 px-3 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:text-white">
                        </div>
                    </div>
                </form>

                <!-- Footer -->
                <div class="absolute bottom-0 left-0 right-0 border-t border-gray-200 dark:border-gray-700 px-4 py-4 sm:px-6">
                    <div class="flex justify-end space-x-3">
                        <button id="cancel-category"
                            class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-md border border-gray-300 dark:border-gray-600">
                            Cancel
                        </button>
                        <button id="save-category"
                            class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md inline-flex items-center">
                            <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                            </svg>
                            Save
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
